<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="container">
    <h2>Login</h2>
    <form id="loginForm">
    <label>Username (email or phone):<input type="text" name="username"></label>
    <label>Password:<input type="password" name="password"></label>
    <button type="submit">Login</button>
    </form>
    <script>
console.log('=== LOGIN PAGE LOADED ===');
const loginForm = document.getElementById('loginForm');
console.log('Form element found:', loginForm ? 'YES' : 'NO');

    async function redirectToDashboard(token) {
        const response = await fetch('/auth/me', {
            headers: {
                'Authorization': 'Bearer ' + token
            }
        });

        if (!response.ok) {
            throw new Error('Unable to load user profile');
        }

        const user = await response.json();
        const target = user.role === 'DRIVER' ? '/driver-dashboard.html' : '/passenger-dashboard.html';
        window.location.href = target;
    }

loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const data = {};
    new FormData(loginForm).forEach((value,key) => data[key]=typeof value === 'string' ? value.trim() : value);
    if (!data.username || !data.password) {
        alert('Please enter both username and password');
        return;
    }
    console.log('Attempting login with:', data.username);
    fetch('/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(r => {
        console.log('Login response status:', r.status);
        if (r.ok) {
            r.json().then(j => {
                console.log('Login response JSON:', j);
                if (j.token) {
                    localStorage.setItem('token', j.token);
                    console.log('Token stored in localStorage:', j.token.substring(0,20) + '...');
                    console.log('Token in localStorage after save:', localStorage.getItem('token'));
                    redirectToDashboard(j.token).catch(profileErr => {
                        console.error('Profile redirect error:', profileErr);
                        alert('Login successful, but dashboard lookup failed. Redirecting to home.');
                        window.location.href = '/';
                    });
                } else {
                    alert('No token in response');
                }
            }).catch(parseErr => {
                console.error('JSON parse error:', parseErr);
                alert('Error parsing response');
            });
        } else {
            r.text().then(t => {
                console.error('Login failed:', t);
                alert('Login failed: '+t);
            });
        }
    }).catch(err => {
        console.error('Network error:', err);
        alert('Network error: ' + err.message);
    });
});
</script>
</div>
</body>
</html>
