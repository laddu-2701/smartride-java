<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartRide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.12/dist/lottie-player.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #6C63FF;
            --primary-dark: #5a52e0;
            --accent: #FF6584;
            --bg: #f7f8fc;
            --surface: #ffffff;
            --text: #1a1a2e;
            --muted: #6b7280;
            --border: #e5e7eb;
            --radius: 14px;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 2rem; height: 68px;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 2px 16px rgba(108,99,255,0.07);
        }
        .nav-logo { font-size: 1.4rem; font-weight: 800; color: var(--primary); text-decoration: none; letter-spacing: -0.5px; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; align-items: center; gap: 0.5rem; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--muted); font-size: 0.93rem; font-weight: 500; padding: 0.4rem 0.8rem; border-radius: 8px; transition: color 0.2s, background 0.2s; }
        .nav-links a:hover { color: var(--primary); background: rgba(108,99,255,0.07); }
        .nav-cta { display: flex; align-items: center; gap: 0.6rem; }
        .btn-outline { padding: 0.45rem 1.1rem; border: 1.5px solid var(--primary); border-radius: 8px; color: var(--primary); font-size: 0.9rem; font-weight: 600; text-decoration: none; background: transparent; transition: background 0.2s, color 0.2s; }
        .btn-outline:hover { background: var(--primary); color: #fff; }
        .btn-solid { padding: 0.45rem 1.2rem; border-radius: 8px; background: var(--primary); color: #fff; font-size: 0.9rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: background 0.2s, transform 0.15s; }
        .btn-solid:hover { background: var(--primary-dark); transform: translateY(-1px); }

        #profileArea { display: none; position: relative; }
        .avatar-btn { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; font-size: 0.9rem; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        .avatar-btn:hover { transform: scale(1.08); }
        .dropdown { display: none; position: absolute; right: 0; top: calc(100% + 10px); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); min-width: 210px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); overflow: hidden; }
        .dropdown.open { display: block; }
        .dropdown-header { padding: 1rem 1.1rem 0.7rem; border-bottom: 1px solid var(--border); }
        .dropdown-header .uname { font-weight: 700; font-size: 0.95rem; }
        .dropdown-header .uemail { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
        .dropdown a, .dropdown button { display: flex; align-items: center; gap: 0.5rem; padding: 0.7rem 1.1rem; color: var(--text); font-size: 0.88rem; font-weight: 500; text-decoration: none; background: none; border: none; width: 100%; cursor: pointer; text-align: left; transition: background 0.15s; }
        .dropdown a:hover, .dropdown button:hover { background: var(--bg); }
        .logout-btn { color: var(--accent) !important; }

        .hero { min-height: 100vh; display: flex; align-items: center; padding: 100px 2rem 4rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%; background: rgba(255,255,255,0.05); top: -150px; right: -150px; }
        .hero::after { content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%; background: rgba(255,255,255,0.04); bottom: -100px; left: -100px; }
        .hero-inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; width: 100%; position: relative; z-index: 1; }
        .hero-text h1 {
            font-size: clamp(2.4rem, 4.4vw, 3.9rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.4rem;
            letter-spacing: -0.03em;
            animation: slideInLeft 0.7s ease both;
            background: linear-gradient(120deg, #ffffff 0%, #ffeaa7 40%, #ffd54f 70%, #ffffff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }
        .hero-text h1 span { color: #ffd700; }
        .hero-text p { font-size: 1.1rem; color: rgba(255,255,255,0.85); line-height: 1.7; margin-bottom: 2rem; animation: slideInLeft 0.9s ease both; }
        .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; animation: slideInLeft 1.1s ease both; }
        .hero-btn-primary { padding: 0.85rem 2rem; background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a2e; font-size: 1rem; font-weight: 700; border-radius: 10px; text-decoration: none; border: none; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 18px rgba(255,215,0,0.35); }
        .hero-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,215,0,0.5); }
        .hero-btn-secondary { padding: 0.85rem 2rem; background: transparent; color: #fff; font-size: 1rem; font-weight: 600; border-radius: 10px; text-decoration: none; border: 2px solid rgba(255,255,255,0.7); cursor: pointer; transition: background 0.2s, border-color 0.2s, transform 0.2s; }
        .hero-btn-secondary:hover { background: rgba(255,255,255,0.12); border-color: #fff; transform: translateY(-2px); }

        .hero-illustration { display: flex; justify-content: center; align-items: center; }
        .car-svg { width: 100%; max-width: 420px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.2)); }

        @keyframes slideInLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }

        .stats { background: var(--surface); border-bottom: 1px solid var(--border); }
        .stats-inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); text-align: center; }
        .stat-item { padding: 2rem 1rem; border-right: 1px solid var(--border); }
        .stat-item:last-child { border-right: none; }
        .stat-value { font-size: 2rem; font-weight: 900; color: var(--primary); }
        .stat-label { font-size: 0.85rem; color: var(--muted); margin-top: 0.3rem; }

        .features { padding: 5rem 2rem; background: var(--bg); }
        .section-header { text-align: center; margin-bottom: 3rem; }
        .section-header h2 { font-size: 2.2rem; font-weight: 800; color: var(--text); margin-bottom: 0.6rem; }
        .section-header p { color: var(--muted); font-size: 1rem; max-width: 520px; margin: 0 auto; line-height: 1.7; }
        .section-header h2 span { color: var(--primary); }
        .features-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; }
        .feature-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem 1.5rem; transition: transform 0.25s, box-shadow 0.25s; }
        .feature-card:hover { transform: translateY(-6px); box-shadow: 0 12px 40px rgba(108,99,255,0.12); }
        .feature-icon { width: 52px; height: 52px; border-radius: 12px; background: linear-gradient(135deg, rgba(108,99,255,0.12), rgba(108,99,255,0.04)); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 1.2rem; }
        .feature-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.5rem; }
        .feature-card p { font-size: 0.88rem; color: var(--muted); line-height: 1.6; }

        .cta-banner { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 4rem 2rem; text-align: center; }
        .cta-banner h2 { font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 0.8rem; }
        .cta-banner p { color: rgba(255,255,255,0.85); font-size: 1rem; margin-bottom: 2rem; }

        footer { background: var(--text); color: rgba(255,255,255,0.5); text-align: center; padding: 1.6rem; font-size: 0.85rem; }
        footer a { color: rgba(255,255,255,0.7); text-decoration: none; }

        #welcomeBar { display: none; background: linear-gradient(90deg, var(--primary), var(--primary-dark)); color: #fff; text-align: center; padding: 0.55rem 1rem; font-size: 0.88rem; font-weight: 500; position: fixed; top: 68px; left: 0; right: 0; z-index: 90; animation: slideDown 0.4s ease; }
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 768px) {
            .hero-inner { grid-template-columns: 1fr; text-align: center; }
            .hero-actions { justify-content: center; }
            .hero-illustration { display: none; }
            .stats-inner { grid-template-columns: repeat(2, 1fr); }
            .stat-item:nth-child(2) { border-right: none; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

<nav>
    <a class="nav-logo" href="/">Smart<span>Ride</span></a>
    <div id="profileArea">
        <button class="avatar-btn" id="avatarBtn" onclick="toggleDropdown()">?</button>
        <div class="dropdown" id="profileDropdown">
            <div class="dropdown-header">
                <div class="uname" id="ddName">User</div>
                <div class="uemail" id="ddEmail"></div>
            </div>
            <a href="/dashboard.html">&#127968; Dashboard</a>
            <a href="/passenger-dashboard.html">🚕 Passenger</a>
            <a href="/driver-dashboard.html">🚗 Driver</a>
            <a href="/reviews.html">⭐ Reviews</a>
            <a href="/admin-dashboard.html" id="adminDashboardLink" style="display:none;">🛡 Admin Dashboard</a>
            <a href="/my-bookings.html">&#127915; My Bookings</a>
            <button class="logout-btn" onclick="logout()">&#128682; Logout</button>
        </div>
    </div>
</nav>

<div id="welcomeBar"></div>

<section class="hero">
    <div class="hero-inner">
        <div class="hero-text">
            <h1>Start the ride smarter</h1>
            <div class="hero-actions">
                <a class="hero-btn-secondary" href="/login.html">Login</a>
                <a class="hero-btn-primary" href="/register.html">Register</a>
            </div>
        </div>
        <div class="hero-illustration">
            <img src="/car-animation.jpg" alt="SmartRide car" style="width: 100%; max-width: 420px; height: auto; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.2)); border-radius: 12px;" />
        </div>
    </div>
</section>

<footer>
    <p>&copy; 2026 SmartRide &nbsp;|&nbsp; <a href="/login.html">Login</a> &nbsp;|&nbsp; <a href="/register.html">Register</a></p>
</footer>

<script>
    const token = localStorage.getItem('token');
    const guestNav = document.getElementById('guestNav');
    if (token) {
        fetch('/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(user => {
                if (guestNav) {
                    guestNav.style.display = 'none';
                }
                document.getElementById('profileArea').style.display = 'block';
                const initials = (user.username || user.email || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
                document.getElementById('avatarBtn').textContent = initials;
                document.getElementById('ddName').textContent = user.username || user.email;
                document.getElementById('ddEmail').textContent = user.email || '';
                if (user.role === 'ADMIN') {
                    const adminLink = document.getElementById('adminDashboardLink');
                    if (adminLink) {
                        adminLink.style.display = 'flex';
                    }
                }
                const bar = document.getElementById('welcomeBar');
                bar.textContent = 'Welcome back, ' + (user.username || user.email) + '!';
                bar.style.display = 'block';
            })
            .catch(() => localStorage.removeItem('token'));
    }
    function toggleDropdown() {
        document.getElementById('profileDropdown').classList.toggle('open');
    }
    document.addEventListener('click', function(e) {
        if (!document.getElementById('profileArea').contains(e.target)) {
            document.getElementById('profileDropdown').classList.remove('open');
        }
    });
    function logout() {
        localStorage.removeItem('token');
        window.location.reload();
    }
</script>
</body>
</html>
