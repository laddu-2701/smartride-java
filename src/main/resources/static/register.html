<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="container">
    <h2>Register</h2>
    <form id="registerForm">
    <label>Name:<input type="text" name="name"></label>
    <label>Email:<input type="email" name="email"></label>
    <label>Phone:<input type="text" name="phone"></label>
    <label>Password:<input type="password" name="password"></label>
    <label>Role:
        <select name="role">
            <option value="PASSENGER">Passenger</option>
            <option value="DRIVER">Driver</option>
        </select>
    </label>
    <div id="driverFields" style="display:none;">
        <label>Vehicle Model:<input type="text" name="vehicleModel"></label>
        <label>License Plate:<input type="text" name="licensePlate"></label>
        <label>Capacity:<input type="number" name="capacity" min="1"></label>
    </div>
    <button type="submit">Submit</button>
    </form>
    <script>
console.log('=== REGISTER PAGE LOADED ===');
const roleSelect = document.querySelector('select[name="role"]');
const driverFields = document.getElementById('driverFields');

function updateDriverFields() {
    const isDriver = roleSelect.value === 'DRIVER';
    driverFields.style.display = isDriver ? 'block' : 'none';
    // disable inputs when not a driver so they aren't submitted accidentally
    driverFields.querySelectorAll('input').forEach(i => i.disabled = !isDriver);
}

roleSelect.addEventListener('change', updateDriverFields);
updateDriverFields(); // initialize on page load

// submit registration via fetch
const form = document.getElementById('registerForm');
form.addEventListener('submit', function(e) {
    e.preventDefault();
    const data = {};
    new FormData(form).forEach((value,key) => data[key]=typeof value === 'string' ? value.trim() : value);

    if (!data.name || !data.password || !data.role || (!data.email && !data.phone)) {
        alert('Please fill all required fields: name, password, role and at least one of email or phone.');
        return;
    }

    const readErrorMessage = async (response) => {
        const contentType = response.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
            try {
                const json = await response.json();
                if (json && typeof json === 'object') {
                    return json.message || json.error || json.details || null;
                }
            } catch (_) {
                // ignore parse errors and continue to fallback
            }
        }

        try {
            const text = (await response.text()).trim();
            if (text) {
                return text;
            }
        } catch (_) {
            // ignore read errors and continue to fallback
        }

        return `Request failed (${response.status} ${response.statusText || 'Unknown Error'})`;
    };

    fetch('/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(async r => {
        if (!r.ok) {
            const msg = await readErrorMessage(r);
            alert('Error: ' + msg);
            return;
        }

        const response = await r.json();
        const emailSent = !!response.emailNotificationSent;
        if (emailSent) {
            alert('Registration successful. A confirmation email has been sent to your inbox.');
        } else {
            alert('Registration successful, but confirmation email could not be sent now. Please verify SMTP settings and login normally.');
        }
        window.location.href = '/login.html';
    }).catch((err) => {
        const details = err && err.message ? `: ${err.message}` : '';
        alert('Network error' + details);
    });
});
</script>
</div>
</body>
</html>
