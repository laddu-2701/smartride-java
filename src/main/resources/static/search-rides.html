<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search & Book Rides</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
<div class="container">
    <h2>Search & Book a Ride</h2>
    <form id="searchForm">
        <label>From: <input type="text" name="source" required></label>
        <label>To: <input type="text" name="destination" required></label>
        <label>Date: <input type="date" name="date" required></label>
        <button type="submit">Search</button>
    </form>

    <div id="stripeCardPanel" style="margin:0.8rem 0; text-align:left; border:1px solid #b8defa; border-radius:10px; background:#f8fcff; padding:0.75rem;">
        <strong>Secure Payment (Stripe)</strong>
        <div id="card-element" style="background:#fff; border:1px solid #cfdff0; border-radius:8px; padding:0.65rem; margin-top:0.4rem;"></div>
        <div id="card-errors" style="color:#c0392b; font-size:0.82rem; margin-top:0.35rem;"></div>
    </div>
    
    <div id="results"></div>
    
    <script>
const token = localStorage.getItem('token');
let stripeClient = null;
let stripeCard = null;
if (!token) {
    alert('Please login first');
    window.location.href = '/login.html';
}

async function initStripe() {
    const resp = await fetch('/payments/config', {
        headers: {
            'Authorization': 'Bearer ' + token
        }
    });

    if (!resp.ok) {
        document.getElementById('stripeCardPanel').style.display = 'none';
        return; // silently hide — Stripe is optional
    }

    const config = await resp.json();
    if (!config.stripeEnabled || !config.stripePublishableKey) {
        document.getElementById('stripeCardPanel').style.display = 'none';
        return; // Stripe optional — hide panel, booking still works in sandbox mode
    }

    stripeClient = Stripe(config.stripePublishableKey);
    const elements = stripeClient.elements();
    stripeCard = elements.create('card', { hidePostalCode: true });
    stripeCard.mount('#card-element');
    stripeCard.on('change', function(event) {
        document.getElementById('card-errors').textContent = event.error ? event.error.message : '';
    });
}

initStripe();

document.getElementById('searchForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const source = document.querySelector('input[name="source"]').value;
    const destination = document.querySelector('input[name="destination"]').value;
    const date = document.querySelector('input[name="date"]').value;
    
    console.log('Searching for rides with token:', token ? 'YES' : 'NO');
    const resp = await fetch(`/rides/match?source=${source}&destination=${destination}&date=${date}`, {
        headers: {
            'Authorization': 'Bearer ' + token
        }
    });
    console.log('Search response status:', resp.status);
    const rides = await resp.json();
    
    if (rides.length === 0) {
        document.getElementById('results').innerHTML = '<p>No rides found</p>';
        return;
    }
    
    let html = '<h3>Available Rides</h3>';
    rides.forEach(match => {
        const r = match.ride || match;
        html += `<div style="border:1px solid #0066cc; padding:1rem; margin:0.5rem 0; border-radius:4px;">
            <p><strong>${r.source} → ${r.destination}</strong></p>
            <p>Date: ${r.date} | Time: ${r.time}</p>
            <p>Driver: ${r.driverName} | Vehicle: ${r.vehicleModel}</p>
            ${match.matchType ? `<p>Match Type: <strong>${match.matchType}</strong> | Score: ${match.matchScore}</p>` : ''}
            <p>Available Seats: ${r.availableSeats} | Price/Seat: $${r.pricePerSeat}</p>
            <label>Seats to book: <input type="number" id="seats_${r.id}" min="1" max="${r.availableSeats}" value="1"></label>
            <button onclick="previewFare(${r.id})">Preview Fare</button>
            <button onclick="bookRide(${r.id})">Pay & Book (Stripe)</button>
        </div>`;
    });
    document.getElementById('results').innerHTML = html;
});

async function bookRide(rideId) {
    if (!stripeClient || !stripeCard) {
        alert('Stripe is not ready. Check payment configuration and refresh.');
        return;
    }

    const seats = parseInt(document.getElementById('seats_' + rideId).value);
    const source = document.querySelector('input[name="source"]').value;
    const destination = document.querySelector('input[name="destination"]').value;

    const pmResult = await stripeClient.createPaymentMethod({
        type: 'card',
        card: stripeCard
    });
    if (pmResult.error) {
        alert(pmResult.error.message);
        return;
    }

    const gateway = 'STRIPE';
    const paymentToken = pmResult.paymentMethod.id;
    const resp = await fetch('/bookings/book-with-payment', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ rideId, seats, source, destination, gateway, paymentToken })
    });
    
    if (resp.ok) {
        const data = await resp.json();
        alert(`Booking confirmed and paid! Total: $${data.booking.totalPrice}. Payment Ref: ${data.payment.providerPaymentId}`);
        document.getElementById('searchForm').reset();
        document.getElementById('results').innerHTML = '';
    } else {
        const err = await resp.text();
        alert(err || 'Booking failed');
    }
}

async function previewFare(rideId) {
    const seats = parseInt(document.getElementById('seats_' + rideId).value);
    const source = document.querySelector('input[name="source"]').value;
    const destination = document.querySelector('input[name="destination"]').value;
    const resp = await fetch(`/bookings/fare-preview?rideId=${rideId}&seats=${seats}&source=${encodeURIComponent(source)}&destination=${encodeURIComponent(destination)}`, {
        headers: {
            'Authorization': 'Bearer ' + token
        }
    });

    if (!resp.ok) {
        const err = await resp.text();
        alert(err || 'Could not preview fare');
        return;
    }

    const fare = await resp.json();
    alert(`Estimated Fare:\nBase $${fare.baseFare} + ($${fare.ratePerKm}/km * ${fare.distanceKm} km) = $${fare.fareBeforeSplit}\nYour total: $${fare.totalFare}`);
}
    </script>
</div>
</body>
</html>
