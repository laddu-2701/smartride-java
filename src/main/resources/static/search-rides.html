<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search & Book Rides</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
<div class="container">
    <h2>Search & Book a Ride</h2>
    <form id="searchForm">
        <label>From: <input type="text" name="source" required></label>
        <label>To: <input type="text" name="destination" required></label>
        <label>Date: <input type="date" name="date" required></label>

        <div style="margin-top:0.75rem; padding-top:0.75rem; border-top:1px solid #e5ecf5; text-align:left;">
            <h3 style="font-size:0.95rem; margin-bottom:0.4rem;">Filters (optional)</h3>
            <label style="display:inline-block; margin-right:0.75rem; font-size:0.85rem;">Min Price
                <input type="number" step="0.5" name="minPrice" style="width:90px;">
            </label>
            <label style="display:inline-block; margin-right:0.75rem; font-size:0.85rem;">Max Price
                <input type="number" step="0.5" name="maxPrice" style="width:90px;">
            </label>
            <label style="display:inline-block; margin-right:0.75rem; font-size:0.85rem;">Vehicle Type
                <input type="text" name="vehicleType" placeholder="e.g. Sedan" style="width:120px;">
            </label>
            <label style="display:inline-block; font-size:0.85rem;">Min Rating
                <input type="number" min="1" max="5" step="0.5" name="minRating" style="width:70px;">
            </label>
        </div>

        <button type="submit" style="margin-top:0.75rem;">Search</button>
    </form>

    <div id="results"></div>

    <div id="checkoutPanel" style="margin:0.8rem 0; display:none; text-align:left; border:1px solid #b8defa; border-radius:10px; background:#f8fcff; padding:0.75rem;">
        <h3 style="margin:0 0 0.35rem; font-size:0.95rem;">Review your ride &amp; pay</h3>
        <div id="orderSummary" style="font-size:0.85rem; margin-bottom:0.5rem; color:#0f172a;"></div>
        <div style="border-top:1px solid #e0edf8; padding-top:0.45rem; margin-top:0.35rem;">
            <p style="font-size:0.82rem; margin:0 0 0.3rem;"><strong>Payment method</strong></p>
            <label style="display:block; font-size:0.82rem; margin-bottom:0.25rem;">
                <input type="radio" name="paymentMethod" checked disabled>
                Razorpay Secure Checkout
            </label>
            <p style="font-size:0.78rem; color:#6b7280; margin:0 0 0.3rem;">
                Pay safely with UPI, cards, wallets, or netbanking through Razorpay.
            </p>
            <button type="button" id="razorpayPayBtn" style="margin-top:0.5rem; display:none;">Pay with Razorpay</button>
        </div>
    </div>
    
    <script>
const token = localStorage.getItem('token');
let stripeClient = null;
let stripeCard = null;
let selectedRideId = null;
let selectedSeats = null;
let selectedFare = null;
let joinedRideIds = new Set();
let paymentConfig = {
    stripeEnabled: false,
    stripePublishableKey: '',
    razorpayEnabled: false,
    razorpayKeyId: '',
    razorpayCurrency: 'INR'
};
const razorpayPayBtn = document.getElementById('razorpayPayBtn');
if (!token) {
    alert('Please login first');
    window.location.href = '/login.html';
}

async function initStripe() {
    const resp = await fetch('/payments/config', {
        headers: {
            'Authorization': 'Bearer ' + token
        }
    });

    if (!resp.ok) {
        document.getElementById('checkoutPanel').style.display = 'none';
        return; // silently hide — Stripe is optional
    }

    paymentConfig = await resp.json();
    if (razorpayPayBtn) {
        razorpayPayBtn.style.display = paymentConfig.razorpayEnabled ? 'inline-flex' : 'none';
    }

    if (!paymentConfig.stripeEnabled || !paymentConfig.stripePublishableKey) {
        document.getElementById('checkoutPanel').style.display = 'none';
        return; // payment optional — hide panel if nothing is configured
    }
}

initStripe();

async function openRazorpayCheckout(data) {
    if (typeof Razorpay === 'undefined') {
        throw new Error('Razorpay checkout script is not loaded');
    }

    const payment = data.payment;
    const booking = data.booking;
    const amountInPaise = Math.max(100, Math.round(Number(payment.amount || booking.totalPrice || 0) * 100));

    return new Promise((resolve, reject) => {
        const options = {
            key: paymentConfig.razorpayKeyId,
            amount: amountInPaise,
            currency: payment.currency || paymentConfig.razorpayCurrency || 'INR',
            name: 'SmartRide',
            description: `Ride booking #${booking.id}`,
            order_id: payment.providerOrderId,
            handler: async function (response) {
                try {
                    const confirmResp = await fetch('/payments/razorpay/confirm', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token
                        },
                        body: JSON.stringify({
                            bookingId: booking.id,
                            razorpay_order_id: response.razorpay_order_id,
                            razorpay_payment_id: response.razorpay_payment_id,
                            razorpay_signature: response.razorpay_signature
                        })
                    });

                    if (!confirmResp.ok) {
                        const err = await confirmResp.text();
                        throw new Error(err || 'Unable to confirm Razorpay payment');
                    }

                    document.getElementById('checkoutPanel').style.display = 'none';
                    alert('Razorpay payment confirmed and booking completed.');
                    await loadJoinedRides();
                    await performSearch();
                    resolve(await confirmResp.json());
                } catch (err) {
                    reject(err);
                }
            },
            modal: {
                ondismiss: function () {
                    resolve(null);
                }
            },
            theme: { color: '#0b66c3' }
        };

        const razorpay = new Razorpay(options);
        razorpay.on('payment.failed', function (response) {
            const reason = response && response.error && response.error.description ? response.error.description : 'Razorpay payment failed';
            reject(new Error(reason));
        });
        razorpay.open();
    });
}

async function loadJoinedRides() {
    try {
        const resp = await fetch('/bookings/my-bookings', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!resp.ok) {
            joinedRideIds = new Set();
            return;
        }
        const bookings = await resp.json();
        joinedRideIds = new Set(bookings.map(b => b.rideId));
    } catch (_) {
        joinedRideIds = new Set();
    }
}

async function performSearch() {
    const source = document.querySelector('input[name="source"]').value;
    const destination = document.querySelector('input[name="destination"]').value;
    const date = document.querySelector('input[name="date"]').value;
    const minPriceRaw = document.querySelector('input[name="minPrice"]').value;
    const maxPriceRaw = document.querySelector('input[name="maxPrice"]').value;
    const vehicleTypeRaw = document.querySelector('input[name="vehicleType"]').value;
    const minRatingRaw = document.querySelector('input[name="minRating"]').value;

    const minPrice = minPriceRaw ? parseFloat(minPriceRaw) : null;
    const maxPrice = maxPriceRaw ? parseFloat(maxPriceRaw) : null;
    const vehicleType = vehicleTypeRaw ? vehicleTypeRaw.trim().toLowerCase() : '';
    const minRating = minRatingRaw ? parseFloat(minRatingRaw) : null;
    
    console.log('Searching for rides with token:', token ? 'YES' : 'NO');
    const resp = await fetch(`/rides/match?source=${source}&destination=${destination}&date=${date}`, {
        headers: {
            'Authorization': 'Bearer ' + token
        }
    });
    console.log('Search response status:', resp.status);
    const rides = await resp.json();

    if (!Array.isArray(rides) || rides.length === 0) {
        document.getElementById('results').innerHTML = '<p>No rides found</p>';
        return;
    }

    // Fetch driver rating summaries so we can filter and display ratings
    const driverIds = Array.from(new Set(rides
        .map(match => (match.ride || match).driverId)
        .filter(id => id !== null && id !== undefined)));

    const driverRatings = {};
    await Promise.all(driverIds.map(async (id) => {
        try {
            const r = await fetch(`/reviews/summary/${id}`, { headers: { 'Authorization': 'Bearer ' + token } });
            if (r.ok) {
                driverRatings[id] = await r.json();
            }
        } catch (err) {
            console.warn('Rating lookup failed for driver', id, err);
        }
    }));

    const filtered = rides.filter(match => {
        const r = match.ride || match;
        if (!r) return false;

        // Hide rides that have no seats left
        if (!r.availableSeats || r.availableSeats <= 0) {
            return false;
        }

        if (minPrice !== null && !isNaN(minPrice) && r.pricePerSeat < minPrice) {
            return false;
        }
        if (maxPrice !== null && !isNaN(maxPrice) && r.pricePerSeat > maxPrice) {
            return false;
        }
        if (vehicleType && (!r.vehicleModel || !r.vehicleModel.toLowerCase().includes(vehicleType))) {
            return false;
        }

        if (minRating !== null && !isNaN(minRating)) {
            const summary = driverRatings[r.driverId];
            const rating = summary && typeof summary.averageRating === 'number'
                ? summary.averageRating
                : 0;
            if (rating < minRating) {
                return false;
            }
        }

        return true;
    });

    if (filtered.length === 0) {
        document.getElementById('results').innerHTML = '<p>No rides matched your filters.</p>';
        return;
    }

    function labelMatchType(raw) {
        if (!raw) return 'Partial route';
        if (raw === 'DIRECT') return 'Direct route';
        if (raw === 'SAME_DEST_MID_ROUTE') return 'Same destination (mid-route pickup)';
        return 'Partial route';
    }

    let html = '<h3>Browse Matching Rides</h3>';
    filtered.forEach(match => {
        const r = match.ride || match;
        const ratingSummary = driverRatings[r.driverId];
        const ratingText = ratingSummary
            ? `Rating: ${ratingSummary.averageRating} (${ratingSummary.reviewCount} reviews)`
            : 'Rating: N/A';
        const alreadyJoined = joinedRideIds.has(r.id);
        html += `<div style="border:1px solid #0066cc; padding:1rem; margin:0.5rem 0; border-radius:4px;">
            <p><strong>${r.source} → ${r.destination}</strong></p>
            <p>Date: ${r.date} | Time: ${r.time}</p>
            <p>Driver: ${r.driverName} | Vehicle: ${r.vehicleModel || 'N/A'} | ${ratingText}</p>
            ${match.matchType ? `<p>Match Type: <strong>${labelMatchType(match.matchType)}</strong> | Score: ${match.matchScore}</p>` : ''}
            <p>Available Seats: ${r.availableSeats} | Price/Seat: $${r.pricePerSeat}</p>
            <label>Seats to book: <input type="number" id="seats_${r.id}" min="1" max="${r.availableSeats}" value="1" ${alreadyJoined ? 'disabled' : ''}></label>
            ${alreadyJoined
                ? '<p style="color:#059669; font-size:0.85rem; margin-top:0.35rem;"><strong>You have already joined this ride.</strong></p>'
                : `<button onclick="previewFare(${r.id})">Review Fare</button>
                   <button onclick="bookRide(${r.id})">Place Order &amp; Pay</button>`}
        </div>`;
    });
    document.getElementById('results').innerHTML = html;
}

document.getElementById('searchForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    await loadJoinedRides();
    await performSearch();
});

async function bookRide(rideId) {
    const seats = parseInt(document.getElementById('seats_' + rideId).value);
    const source = document.querySelector('input[name="source"]').value;
    const destination = document.querySelector('input[name="destination"]').value;
    const gateway = 'RAZORPAY';
    const paymentToken = '';
    const resp = await fetch('/bookings/book-with-payment', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ rideId, seats, source, destination, gateway, paymentToken })
    });
    
    if (resp.ok) {
        const data = await resp.json();
        if (data.payment && data.payment.gateway === 'RAZORPAY' && data.payment.status === 'PENDING') {
            await openRazorpayCheckout(data);
        } else {
            alert(`Booking confirmed! Total fare: $${data.booking.totalPrice}`);
            await loadJoinedRides();
            await performSearch();
            document.getElementById('checkoutPanel').style.display = 'none';
            selectedRideId = null;
            selectedSeats = null;
            selectedFare = null;
        }
    } else {
        const err = await resp.text();
        alert(err || 'Booking failed');
    }
}

async function previewFare(rideId) {
    const seats = parseInt(document.getElementById('seats_' + rideId).value);
    const source = document.querySelector('input[name="source"]').value;
    const destination = document.querySelector('input[name="destination"]').value;
    const resp = await fetch(`/bookings/fare-preview?rideId=${rideId}&seats=${seats}&source=${encodeURIComponent(source)}&destination=${encodeURIComponent(destination)}`, {
        headers: {
            'Authorization': 'Bearer ' + token
        }
    });

    if (!resp.ok) {
        const err = await resp.text();
        alert(err || 'Could not preview fare');
        return;
    }

    const fare = await resp.json();
    selectedRideId = rideId;
    selectedSeats = seats;
    selectedFare = fare;

    const summary = document.getElementById('orderSummary');
    const text = `Base $${fare.baseFare} + ($${fare.ratePerKm}/km × ${fare.distanceKm} km) = $${fare.fareBeforeSplit}. ` +
        `Shared by ${fare.sharedByPassengers} passenger(s). Your total: $${fare.totalFare} for ${seats} seat(s).`;
    summary.innerHTML = `
        <p style="margin:0 0 0.3rem;"><strong>Selected ride:</strong> #${rideId} | Seats: ${seats}</p>
        <p style="margin:0;">${text}</p>
    `;
    document.getElementById('checkoutPanel').style.display = 'block';
}
    </script>
</div>
</body>
</html>

        <button type="button" class="back-home-btn" onclick="window.location.href='/'">
            <span>&larr;</span>
        </button>
