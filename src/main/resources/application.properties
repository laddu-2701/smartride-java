spring.datasource.url=jdbc:h2:mem:carpoolingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# For local dev with in-memory H2, always recreate tables so schemas like USERS/BOOKING exist
spring.jpa.hibernate.ddl-auto=create-drop

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT secret (must be long enough for HS256)
jwt.secret=ThisIsA32ByteLongSecretKeyForHS256!!!
jwt.expiration=3600000

# Mail configuration (set your real SMTP values to enable notifications)
# Example for Gmail: host=smtp.gmail.com, port=587 and an app password
spring.mail.host=smtp.gmail.com
spring.mail.port=587

# It is recommended to pass credentials via environment variables
# e.g. SMTP_USERNAME / SMTP_PASSWORD. For convenience in local dev,
# fall back to the provided Gmail app credentials if env vars are not set.
spring.mail.username=${SMTP_USERNAME:yashwanthrajbingi@gmail.com}
spring.mail.password=${SMTP_PASSWORD:vlvwkgndetrbtkwl}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Dynamic fare configuration
fare.base=2.50
fare.ratePerKm=0.90

# Optional Google Distance Matrix key. If empty, app uses built-in fallback heuristics.
maps.distance.api.key=AIzaSyC2_dtDjp7t7bX2ookBa39Qe4oGT5n42ZI

# Stripe (test mode) configuration
stripe.secret.key=
stripe.publishable.key=
stripe.webhook.secret=

# Razorpay configuration
razorpay.key.id=
razorpay.key.secret=
razorpay.webhook.secret=
razorpay.currency=INR

# Ride reminder scheduler
ride.reminder.hoursBefore=2
ride.reminder.scanMs=300000

# Twilio SMS (optional)
